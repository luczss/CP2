<!DOCTYPE html>
<html lang="en">

        <button class="drawer-fechar" onclick="toggleDrawer()">✕</button>
      </div>
      <div class="drawer-itens" id="drawer-itens"></div>

    </div>
  </div>
    <!--MENU-->
    <nav>
        <a href="index.html" class="nav-logo">Nerdshelf</a>

            <li><a href="index.html" class="ativo">Início</a></li>

        </ul>
        <button class="nav-cart" onclick="toggleDrawer()">
      Carrinho <span class="cart-badge" id="badge">0</span>
    </button>
  </nav>
    <!--CABEÇALHO-->
        <header class="hero">
            <h1>Action<br><em>Figures</em></h1>

    </div>
        <div class="filtros" id="filtros"></div>

    <div class="grid" id="grid-produtos"></div>

        <div class="grid-produtos" id="grid-produtos"></div>
