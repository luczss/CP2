<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NerdShelf — Loja</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet"href="../src/css/estilo.css"/>
</head>
<body>

  <div class="toast" id="toast"></div>

  <div class="overlay" id="overlay" onclick="fecharOverlay(event)">
    <div class="drawer">
      <div class="drawer-header">
        <span class="drawer-titulo">Carrinho</span>
        <button class="drawer-fechar" onclick="toggleDrawer()">✕</button>
      </div>
      <div class="drawer-itens" id="drawer-itens"></div>
      <div class="drawer-footer" id="drawer-footer"></div>
    </div>
  </div>

  <nav>
    <a href="../index.html" class="nav-logo">Nerd<span>Shelf</span></a>
    <ul class="nav-links">
      <li><a href="../index.html" class="ativo">Início</a></li>
      <li><a href="sobre.html">Sobre</a></li>
    </ul>
    <button class="nav-cart" onclick="toggleDrawer()">
      Carrinho <span class="cart-badge" id="badge">0</span>
    </button>
  </nav>
  <!-- HERO -->
  <div class="hero">
    <p class="hero-eyebrow">Resumo da compra</p>
    <h1>Seu<br><em>Carrinho</em></h1>
    <p>Confira os itens selecionados e finalize sua compra.</p>
    <div class="hero-divider"></div>
  </div>
  <!-- CARRINHO ESTÁTICO COM REDUCE -->
    <section class="secao">
    <div class="secao-header">
      <span class="secao-titulo">Itens no carrinho</span>
    </div>
    <!-- Lista gerada pelo JS via DOM -->
    <ul class="carrinho-lista" id="carrinho-lista"></ul>
    <div class="resumo-box">
      <div class="resumo-linha" id="linha-desconto" style="display:none;"></div>
      <div class="resumo-linha total">
        <span class="label">Total da Compra</span>
        <h2 class="valor" id="total-compra">R$ 0,00</h2>
      </div>
    </div>
      <button class="btn-desc" id="btn-desconto">Aplicar desconto de 10%</button>
      <button class="btn-fin" id="btn-finalizar">Finalizar compra</button>
    </section>

  <footer>&copy; 2026 NerdShelf</footer>
  <script src="../src/js/script.js"></script>
</body>
</html>
